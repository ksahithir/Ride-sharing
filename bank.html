<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Details</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f6fa;
}

/* Navbar */
.navbar {
    background: #1e272e;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
}

.menu a {
    color: #dcdde1;
    margin-left: 20px;
    text-decoration: none;
}

/* Container */
.container {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

/* Card */
.card {
    width: 400px;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #2f3640;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div><b>RideShare</b></div>
    <div class="menu">
        <a href="index.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="history.html">Ride History</a>
    </div>
</div>

<div class="container">
    <div class="card">

        <h2>Linked Bank Account</h2>

        <input type="text" placeholder="Account Holder Name">
        <input type="text" placeholder="Bank Name">
        <input type="text" placeholder="Account Number">
        <input type="text" placeholder="IFSC Code">

        <button>Save Details</button>

    </div>
</div>

</body>
</html>
