<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f6fa;
}

/* Navbar */
.navbar {
    background: #1e272e;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
}

.menu a {
    color: #dcdde1;
    margin-left: 20px;
    text-decoration: none;
}

.menu a:hover {
    color: white;
}

/* Profile Container */
.container {
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

/* Card */
.card {
    width: 400px;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
    text-align: center;
}

/* Avatar */
.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #dcdde1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    margin: auto;
}

/* Info */
.info {
    margin-top: 15px;
    text-align: left;
}

.info p {
    margin: 8px 0;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: #2f3640;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #353b48;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div><b>RideShare</b></div>
    <div class="menu">
        <a href="index.html">Home</a>
        <a href="#">Ride History</a>
        <a href="#">Bank</a>
    </div>
</div>

<!-- Profile Card -->
<div class="container">
    <div class="card">

        <div class="avatar">👤</div>

        <h2>Aarya Krunal</h2>

        <div class="info">
            <p><b>Email:</b> Aaryaraichand@gmail.com</p>
            <p><b>Phone:</b> +91 9876543210</p>
            <p><b>Total Rides:</b> 24</p>
            <p><b>Rating:</b> ⭐ 4.8</p>
        </div>

        <button>Edit Profile</button>
        <button>Logout</button>

    </div>
</div>

</body>
</html>
